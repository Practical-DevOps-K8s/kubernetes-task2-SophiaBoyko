apiVersion: batch/v1
kind: Job
metadata:
  name: webapp-migrate
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: sophiaboyko/webapp:latest
          imagePullPolicy: Always
          command: ["bundle", "exec", "rails", "db:create", "db:migrate"]
          env:
            - name: RAILS_ENV
              value: production
            - name: SECRET_KEY_BASE
              value: "a_very_long_secret_key_base_for_rails_production_use"
            - name: DATABASE_URL
              value: "postgresql://postgres:supersecretpassword@postgres:5432/app_production"